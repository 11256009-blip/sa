{% comment %} 左下小圖示按鈕（更精簡） {% endcomment %}
<div style="position:fixed;bottom:20px;left:20px;z-index:9999;">
    {% if user.is_authenticated %}
        <a href="{% url 'logout' %}" aria-label="登出" title="登出" style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;background:#f87171;color:#fff;text-decoration:none;border-radius:999px;box-shadow:0 8px 18px rgba(248,113,113,0.18);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M16 17L21 12L16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M13 19H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    {% else %}
        <a href="{% url 'login' %}" aria-label="登入" title="登入" style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;background:#2563eb;color:#fff;text-decoration:none;border-radius:999px;box-shadow:0 8px 18px rgba(37,99,235,0.14);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M8 17L3 12L8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M3 12H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M16 5h1a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    {% endif %}
</div>
