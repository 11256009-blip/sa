<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增書籍</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input, textarea, select { width: 100%; max-width: 500px; padding: 8px; margin-top: 4px; }
        button { margin-top: 16px; padding: 10px 18px; }
        .success { background: #e6ffed; border: 1px solid #7ed48e; padding: 12px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <h1>新增書籍</h1>

    {% if success %}
        <div class="success">書籍已成功儲存！</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">儲存書籍</button>
    </form>
</body>
</html>
