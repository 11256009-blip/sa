<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刪除書籍</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f8fafc; color: #1f2937; }
        .card { background: white; padding: 28px; border-radius: 18px; box-shadow: 0 18px 32px rgba(15,23,42,0.08); max-width: 560px; margin: 0 auto; }
        h1 { margin-top: 0; }
        .notice { padding: 16px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; margin-bottom: 20px; }
        .actions { display: flex; gap: 12px; }
        .actions button, .actions a { padding: 12px 18px; border-radius: 10px; border: none; text-decoration: none; color: white; font-weight: 700; cursor: pointer; }
        .actions .confirm { background: #dc2626; }
        .actions .cancel { background: #6b7280; }
    </style>
</head>
<body>
    <div class="card">
        <h1>確認刪除</h1>
        <div class="notice">
            確定要刪除這本書嗎？
            <p>書名：{{ book.title }}<br>ISBN：{{ book.isbn }}</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="actions">
                <button type="submit" class="confirm">確定刪除</button>
                <a href="{% url 'book-list' %}" class="cancel">取消</a>
            </div>
        </form>
    </div>
    {% include 'user/logout_fixed.html' %}
</body>
</html>
